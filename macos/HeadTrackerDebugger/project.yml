name: HeadTrackerDebugger
options:
  bundleIdPrefix: com.lidarsight
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES

targets:
  HeadTrackerDebugger:
    type: application
    platform: macOS
    sources:
      - path: HeadTrackerDebugger
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lidarsight.debugger
        INFOPLIST_FILE: HeadTrackerDebugger/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: HeadTrackerDebugger/Resources/HeadTrackerDebugger.entitlements
        COMBINE_HIDPI_IMAGES: YES
    info:
      path: HeadTrackerDebugger/Resources/Info.plist
      properties:
        CFBundleDisplayName: LiDARSight
        CFBundleName: LiDARSight
        CFBundleIdentifier: com.lidarsight.debugger
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: LiDARSight
        LSMinimumSystemVersion: "14.0"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
    entitlements:
      path: HeadTrackerDebugger/Resources/HeadTrackerDebugger.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.server: true
        com.apple.security.network.client: true
