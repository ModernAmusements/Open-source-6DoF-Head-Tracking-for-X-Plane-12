name: LidarSightXP
options:
  bundleIdPrefix: com.lidarsight
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  LidarSightXP:
    type: application
    platform: iOS
    sources:
      - path: LidarSightXP
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lidarsight.xp
        INFOPLIST_FILE: LidarSightXP/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: ""
        ENABLE_BITCODE: NO
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: LidarSightXP/Resources/Info.plist
      properties:
        CFBundleDisplayName: LidarSight XP
        UILaunchScreen:
          UIColorName: ""
        NSCameraUsageDescription: "LidarSight XP needs camera access to track your face for head tracking in X-Plane."
        NSLocalNetworkUsageDescription: "LidarSight XP needs local network access to send head tracking data to your Mac."
        NSBonjourServices:
          - _lidarsight._udp
        UIRequiredDeviceCapabilities:
          - armv7
          - arkit
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
